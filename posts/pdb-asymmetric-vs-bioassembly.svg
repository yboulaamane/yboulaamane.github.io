<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Asymmetric unit versus biological assembly</title>
<desc>Left: asymmetric unit, one chain, hydrophobic face exposed. Right: biological assembly, dimer interface buried.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, Helvetica, sans-serif; }
.h  { font-size:14px; font-weight:700; }
.s  { font-size:12px; font-weight:400; }
.halo-coral  { stroke:#FAECE7; stroke-width:4; paint-order:stroke fill; }
.halo-pink   { stroke:#F5C4B3; stroke-width:4; paint-order:stroke fill; }
.halo-teal   { stroke:#E1F5EE; stroke-width:4; paint-order:stroke fill; }
.halo-purple { stroke:#AFA9EC; stroke-width:4; paint-order:stroke fill; }
.halo-mint   { stroke:#9FE1CB; stroke-width:4; paint-order:stroke fill; }
</style>
</defs>

<rect x="20" y="10" width="295" height="320" rx="14" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<text class="h halo-coral" x="167" y="34" text-anchor="middle" dominant-baseline="central" fill="#111">Asymmetric unit</text>
<text class="s halo-coral" x="167" y="52" text-anchor="middle" dominant-baseline="central" fill="#111">Default download</text>

<ellipse cx="140" cy="178" rx="82" ry="104" fill="#F5C4B3" stroke="#D85A30" stroke-width="1"/>
<text class="h halo-pink" x="140" y="170" text-anchor="middle" dominant-baseline="central" fill="#111">Chain A</text>
<text class="s halo-pink" x="140" y="188" text-anchor="middle" dominant-baseline="central" fill="#111">Monomer only</text>

<rect x="50" y="292" width="185" height="24" rx="6" fill="#D85A30"/>
<text class="s" x="142" y="306" text-anchor="middle" dominant-baseline="central" fill="#fff" style="font-weight:700">Hydrophobic face exposed</text>

<path d="M292 178 L366 178" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="s halo-coral" x="329" y="168" text-anchor="middle" fill="#111">symmetry op.</text>

<rect x="365" y="10" width="295" height="320" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text class="h halo-teal" x="512" y="34" text-anchor="middle" dominant-baseline="central" fill="#111">Biological assembly</text>
<text class="s halo-teal" x="512" y="52" text-anchor="middle" dominant-baseline="central" fill="#111">Use this one</text>

<ellipse cx="458" cy="178" rx="72" ry="104" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
<text class="h halo-purple" x="458" y="178" text-anchor="middle" dominant-baseline="central" fill="#111">Chain A</text>

<ellipse cx="562" cy="178" rx="72" ry="104" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
<text class="h halo-mint" x="562" y="178" text-anchor="middle" dominant-baseline="central" fill="#111">Chain B</text>

<line x1="509" y1="104" x2="511" y2="104" stroke="#534AB7" stroke-width="2.5" stroke-dasharray="4 3"/>
<line x1="509" y1="144" x2="511" y2="144" stroke="#534AB7" stroke-width="2.5" stroke-dasharray="4 3"/>
<line x1="509" y1="178" x2="511" y2="178" stroke="#534AB7" stroke-width="2.5" stroke-dasharray="4 3"/>
<line x1="509" y1="212" x2="511" y2="212" stroke="#534AB7" stroke-width="2.5" stroke-dasharray="4 3"/>
<line x1="509" y1="252" x2="511" y2="252" stroke="#534AB7" stroke-width="2.5" stroke-dasharray="4 3"/>
<text class="s halo-teal" x="510" y="80" text-anchor="middle" style="font-weight:700" fill="#111">interface</text>

<rect x="407" y="292" width="185" height="24" rx="6" fill="#1D9E75"/>
<text class="s" x="499" y="306" text-anchor="middle" dominant-baseline="central" fill="#fff" style="font-weight:700">Interface buried; stable MD</text>

</svg>
