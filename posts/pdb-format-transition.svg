<svg width="100%" viewBox="0 0 680 370" role="img" xmlns="http://www.w3.org/2000/svg">
<title>PDB format transition timeline and comparison</title>
<desc>Timeline showing .pdb deprecation by mid-2027, with side-by-side comparison of legacy .pdb versus mmCIF.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, Helvetica, sans-serif; }
.h  { font-size:14px; font-weight:700; }
.s  { font-size:12px; font-weight:400; }
.sb { font-size:12px; font-weight:700; }
.halo-gray  { stroke:#F1EFE8; stroke-width:4; paint-order:stroke fill; }
.halo-coral { stroke:#FAECE7; stroke-width:4; paint-order:stroke fill; }
.halo-teal  { stroke:#E1F5EE; stroke-width:4; paint-order:stroke fill; }
</style>
</defs>

<rect x="40" y="8" width="600" height="66" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="78" y1="41" x2="612" y2="41" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<circle cx="110" cy="41" r="6" fill="#888"/>
<text class="s halo-gray" x="110" y="58" text-anchor="middle" fill="#111">1970s</text>
<text class="s halo-gray" x="110" y="24" text-anchor="middle" fill="#111">.pdb born</text>

<circle cx="268" cy="41" r="6" fill="#888"/>
<text class="s halo-gray" x="268" y="58" text-anchor="middle" fill="#111">2014</text>
<text class="s halo-gray" x="268" y="24" text-anchor="middle" fill="#111">mmCIF adopted</text>

<circle cx="428" cy="41" r="9" fill="#E24B4A"/>
<text class="sb halo-gray" x="428" y="60" text-anchor="middle" fill="#A32D2D">2026 — act now</text>

<circle cx="578" cy="41" r="9" fill="#3B6D11"/>
<text class="sb halo-gray" x="578" y="60" text-anchor="middle" fill="#3B6D11">mid-2027 — .pdb retired</text>

<rect x="40" y="94" width="286" height="260" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<rect x="40" y="94" width="286" height="38" rx="12" fill="#D85A30"/>
<rect x="40" y="120" width="286" height="12" fill="#D85A30"/>
<text class="h" x="183" y="116" text-anchor="middle" dominant-baseline="central" fill="#fff">Legacy .pdb</text>

<text class="s halo-coral" x="183" y="152" text-anchor="middle" fill="#111">4-character ID (e.g. 2V5Z)</text>
<line x1="64" y1="163" x2="302" y2="163" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="s halo-coral" x="183" y="178" text-anchor="middle" fill="#111">80-char column widths</text>
<line x1="64" y1="189" x2="302" y2="189" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="s halo-coral" x="183" y="204" text-anchor="middle" fill="#111">Max 99,999 atoms</text>
<line x1="64" y1="215" x2="302" y2="215" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="s halo-coral" x="183" y="230" text-anchor="middle" fill="#111">Max 62 chains</text>
<line x1="64" y1="241" x2="302" y2="241" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="s halo-coral" x="183" y="256" text-anchor="middle" fill="#111">Fixed positional parsing</text>
<line x1="64" y1="267" x2="302" y2="267" stroke="#F5C4B3" stroke-width="0.5"/>
<rect x="64" y="276" width="198" height="24" rx="6" fill="#D85A30"/>
<text class="sb" x="163" y="290" text-anchor="middle" dominant-baseline="central" fill="#fff">Breaks on new deposits</text>

<path d="M326 224 L354 224" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="354" y="94" width="286" height="260" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<rect x="354" y="94" width="286" height="38" rx="12" fill="#1D9E75"/>
<rect x="354" y="120" width="286" height="12" fill="#1D9E75"/>
<text class="h" x="497" y="116" text-anchor="middle" dominant-baseline="central" fill="#fff">PDBx/mmCIF</text>

<text class="s halo-teal" x="497" y="152" text-anchor="middle" fill="#111">12-char ID (e.g. pdb_00002v5z)</text>
<line x1="378" y1="163" x2="616" y2="163" stroke="#9FE1CB" stroke-width="0.5"/>
<text class="s halo-teal" x="497" y="178" text-anchor="middle" fill="#111">Key-value dictionary format</text>
<line x1="378" y1="189" x2="616" y2="189" stroke="#9FE1CB" stroke-width="0.5"/>
<text class="s halo-teal" x="497" y="204" text-anchor="middle" fill="#111">No atom count limit</text>
<line x1="378" y1="215" x2="616" y2="215" stroke="#9FE1CB" stroke-width="0.5"/>
<text class="s halo-teal" x="497" y="230" text-anchor="middle" fill="#111">No chain limit</text>
<line x1="378" y1="241" x2="616" y2="241" stroke="#9FE1CB" stroke-width="0.5"/>
<text class="s halo-teal" x="497" y="256" text-anchor="middle" fill="#111">Explicit data relationships</text>
<line x1="378" y1="267" x2="616" y2="267" stroke="#9FE1CB" stroke-width="0.5"/>
<rect x="378" y="276" width="198" height="24" rx="6" fill="#1D9E75"/>
<text class="sb" x="477" y="290" text-anchor="middle" dominant-baseline="central" fill="#fff">Download .cif files today</text>

</svg>
